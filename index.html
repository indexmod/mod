<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>MOD DOCUMENT</title>

<link rel="stylesheet" href="/style.css">
</head>

<body>

<div id="doc" contenteditable="true" spellcheck="false"></div>

<div id="hint">Напиши сообщение...</div>

<script>
const doc = document.getElementById("doc");

let timer = null;

// загрузка состояния
async function load() {
  const res = await fetch("/state");
  doc.innerText = await res.text();
}

// отправка состояния
async function save() {
  await fetch("/state", {
    method: "POST",
    body: doc.innerText
  });
}

// debounce (чтобы не спамить запросами)
doc.addEventListener("input", () => {
  clearTimeout(timer);
  timer = setTimeout(save, 300);
});

// автообновление от других пользователей
setInterval(load, 1200);

load();
</script>

</body>
</html>
