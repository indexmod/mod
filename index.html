<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndexMod Live</title>

<link rel="stylesheet" href="/style.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<img src="/logo.png" class="logo">

<div class="main">
  <div id="editor" contenteditable="true" class="editor"></div>
</div>

<div id="status"></div>

<script>
let path = "home";

const editor = document.getElementById("editor");
const status = document.getElementById("status");

// LOAD
async function load() {
  const res = await fetch("/api/page/" + path);
  const text = await res.text();

  editor.innerHTML = text || "<h1>Start writing...</h1>";
}

load();

// SAVE (debounced)
let t;
editor.addEventListener("input", () => {
  clearTimeout(t);

  t = setTimeout(async () => {
    await fetch("/api/page/" + path, {
      method: "POST",
      body: editor.innerHTML
    });

    status.innerText = "saved";
    setTimeout(() => status.innerText = "", 500);
  }, 300);
});

// LIVE SYNC
setInterval(load, 1200);
</script>

</body>
</html>
