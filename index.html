<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndexMod</title>

<link rel="stylesheet" href="/style.css">
</head>

<body>

<div id="editor" contenteditable="true"></div>

<script>
let path = "home";
const editor = document.getElementById("editor");

// --------------------
// LOAD (как TEXT)
// --------------------
async function load() {
  const res = await fetch("/api/page/" + path);
  const text = await res.text();

  editor.innerText = text || "";
}

// --------------------
// SAVE (TEXT ONLY)
// --------------------
let t;

editor.addEventListener("input", () => {
  clearTimeout(t);

  t = setTimeout(async () => {
    await fetch("/api/page/" + path, {
      method: "POST",
      body: editor.innerText
    });
  }, 250);
});

// --------------------
// LIVE SYNC
// --------------------
setInterval(load, 1200);

load();
</script>

</body>
</html>
