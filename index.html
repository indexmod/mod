<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>MOD CHAT</title>

<link rel="stylesheet" href="/style.css">
</head>

<body>

<div id="chat"></div>

<div id="input">
  <input id="text" placeholder="Привет... напиши сообщение" autofocus />
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("text");

async function load() {
  const res = await fetch("/messages");
  chat.textContent = await res.text();
  chat.scrollTop = chat.scrollHeight;
}

async function send(msg) {
  await fetch("/send", {
    method: "POST",
    body: msg
  });
  input.value = "";
  load();
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    if (input.value.trim()) send(input.value);
  }
});

setInterval(load, 1200);
load();
</script>

</body>
</html>
